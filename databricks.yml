# This is a Databricks asset bundle definition for Behave.
# The Databricks extension requires databricks.yml configuration file.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.

bundle:
  name: Behave

sync:
  include:
    - notebooks/*.py
    - data/personas/*.json
    - data/runs/**/*.json

targets:
  dev:
    mode: development
    default: true
    workspace:
      host: https://dbc-7b106152-caf3.cloud.databricks.com

  ## Optionally, there could be 'staging' or 'prod' targets here.
  #
  # prod:
  #   workspace:
  #     host: https://dbc-7b106152-caf3.cloud.databricks.com
